{% extends "base.html" %}
{% block content %}
<section class="section" style="padding-top:34px"><div class="container"><div class="card" style="max-width:760px;margin:0 auto"><h2>Buyer / Investor Signup</h2><p class="muted">Join the network and get access to homes, rentals, and off-market opportunities.</p>{% if success %}<div class="success">Your buyer signup was received.</div>{% endif %}<form method="post" class="form"><input name="name" placeholder="Full name"><input name="email" placeholder="Email"><input name="market" placeholder="Target market"><select name="type"><option>Buyer</option><option>Investor</option><option>Renter</option><option>Wholesaler</option></select><textarea name="criteria" placeholder="What are you looking for?"></textarea><button class="btn btn-dark" type="submit">Join Network</button></form></div></div></section>
{% endblock %}
