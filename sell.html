{% extends "base.html" %}
{% block content %}
<section class="section" style="padding-top:34px"><div class="container"><div class="card" style="max-width:760px;margin:0 auto"><h2>Seller Submission</h2><p class="muted">Submit your property and get it in front of buyers, agents, and investors.</p>{% if success %}<div class="success">Your seller submission was received.</div>{% endif %}<form method="post" class="form"><input name="name" placeholder="Full name"><input name="email" placeholder="Email"><input name="city" placeholder="City / Market"><input name="price" placeholder="Asking price"><textarea name="details" placeholder="Property details"></textarea><button class="btn btn-dark" type="submit">Submit Property</button></form></div></div></section>
{% endblock %}
